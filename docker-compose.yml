services:
  langfuse-openai-proxy:
    build: .
    container_name: langfuse-openai-proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${PROXY_MEMORY_LIMIT:-512M}
    ports:
      - "${PROXY_PORT:-8000}:8000"
    expose:
      - "8000"
    environment:
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:-http://localhost:4000/v1}
      - UPSTREAM_API_KEY=${UPSTREAM_API_KEY:-}
      - LANGFUSE_DEFAULT_HOST=${LANGFUSE_DEFAULT_HOST:-https://cloud.langfuse.com}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_PROJECT_ID=${LANGFUSE_PROJECT_ID:-}
      - REASONING_AS_CONTENT=${REASONING_AS_CONTENT:-false}
      - MAX_TOKENS_FLOOR=${MAX_TOKENS_FLOOR:-}
      - ANTHROPIC_SHIM_ENABLED=${ANTHROPIC_SHIM_ENABLED:-true}
      - ANTHROPIC_MODEL_MAP=${ANTHROPIC_MODEL_MAP:-claude-3-5-sonnet-20241022:coder14b:latest,claude-sonnet-4-5:coder14b:latest,claude-3-5-haiku-20241022:gemma4:12b,claude-haiku-4-5:gemma4:12b,claude-3-opus-20240229:coder14b:latest,claude-opus-4-5:coder14b:latest}
      - ANTHROPIC_DEFAULT_MODEL=${ANTHROPIC_DEFAULT_MODEL:-coder14b:latest}
      - ANTHROPIC_PAUSED=${ANTHROPIC_PAUSED:-false}
      - ANTHROPIC_SHIM_DEBUG=${ANTHROPIC_SHIM_DEBUG:-false}
      - ANTHROPIC_SHIM_THINK=${ANTHROPIC_SHIM_THINK:-false}
    networks:
      - default
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  dokploy-network:
    external: true
